version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: autollm-backend
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - DB_PATH=/app/data/rag.sqlite
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: autollm-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:

