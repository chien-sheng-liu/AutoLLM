version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: autollm-backend
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: autollm-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: ankane/pgvector:latest
    container_name: autollm-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-autollm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-autollm}
    ports:
      - "${POSTGRES_PORT:-5050}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: autollm-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  backend_data:
  postgres_data:
  redis_data:
